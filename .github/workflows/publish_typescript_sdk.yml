name: Publish TypeScript SDK

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to publish, for example sdk-v-v0.2.0
        required: true
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve release tag
        id: release-tag
        run: echo "tag=${{ github.event.release.tag_name || inputs.tag }}" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.release-tag.outputs.tag }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org/

      - name: Read SDK version
        id: sdk-version
        run: |
          node -e "const { version } = require('./sdks/typescript-sdk/package.json'); const fs = require('fs'); fs.appendFileSync(process.env.GITHUB_OUTPUT, `version=${version}\n`);"

      - name: Check release tag matches SDK version
        id: tag-check
        run: |
          tag="${{ steps.release-tag.outputs.tag }}"
          version="${{ steps.sdk-version.outputs.version }}"
          if [[ "$tag" == "v$version" || "$tag" == "sdk-v$version" || "$tag" == "$version" || "$tag" == "sdk-v-v$version" ]]; then
            echo "publish=true" >> "$GITHUB_OUTPUT"
          else
            echo "publish=false" >> "$GITHUB_OUTPUT"
            echo "Release tag $tag does not match SDK version $version; skipping publish."
          fi

      - name: Install dependencies
        if: steps.tag-check.outputs.publish == 'true'
        working-directory: sdks/typescript-sdk
        run: npm ci

      - name: Build
        if: steps.tag-check.outputs.publish == 'true'
        working-directory: sdks/typescript-sdk
        run: npm run build

      - name: Test
        if: steps.tag-check.outputs.publish == 'true'
        working-directory: sdks/typescript-sdk
        run: npm test -- --run

      - name: Publish
        if: steps.tag-check.outputs.publish == 'true'
        working-directory: sdks/typescript-sdk
        run: npm publish --access public
