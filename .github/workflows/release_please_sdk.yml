name: Release Please — TypeScript SDK

on:
  push:
    branches: [main]
    paths:
      - "sdks/typescript-sdk/**"

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          config-file: .release-please-config.json
          manifest-file: .release-please-manifest.json
