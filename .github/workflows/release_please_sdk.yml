name: Release Please — TypeScript SDK

on:
  push:
    branches: [main]
    paths:
      - "sdks/typescript-sdk/**"

permissions:
  actions: write
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ${{ (startsWith(vars.CI_RUNNER_SMALL, 'blacksmith-') && vars.CI_RUNNER_SMALL) || 'blacksmith-2vcpu-ubuntu-2404' }}
    steps:
      - uses: googleapis/release-please-action@v5
        id: release
        with:
          config-file: .release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Dispatch SDK publish
        if: ${{ steps.release.outputs['sdks/typescript-sdk--release_created'] == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release.outputs['sdks/typescript-sdk--tag_name'] }}
        run: gh workflow run publish_typescript_sdk.yml --ref main -f tag="$RELEASE_TAG"
