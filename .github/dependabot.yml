# To get started with Dependabot version updates, you'll need to specify which
# package ecosystems to update and where the package manifests are located.
# Please see the documentation for all configuration options:
# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

  version: 2

  updates:
    - package-ecosystem: "npm"
      directory: "/"
      schedule:
        interval: "weekly"
      groups:
        npm-minor-patch:
          update-types:
            - "minor"
            - "patch"
      ignore:
        # @modelcontextprotocol/sdk 1.29 only type-checks against zod 4.3.x;
        # zod 4.4 breaks the MCP server build. Hold zod on 4.3 until the SDK
        # declares 4.4 support. See packages/mcp/package.json (~4.3.6 pin).
        - dependency-name: "zod"
          update-types:
            - "version-update:semver-minor"
            - "version-update:semver-major"

    - package-ecosystem: "npm"
      directory: "/packages/mcp"
      schedule:
        interval: "weekly"
      groups:
        mcp-minor-patch:
          update-types:
            - "minor"
            - "patch"
      ignore:
        # zod 4.4 breaks the @modelcontextprotocol/sdk 1.29 type check (see above).
        - dependency-name: "zod"
          update-types:
            - "version-update:semver-minor"
            - "version-update:semver-major"

    - package-ecosystem: "npm"
      directory: "/sdks/typescript-sdk"
      schedule:
        interval: "weekly"
      groups:
        sdk-minor-patch:
          update-types:
            - "minor"
            - "patch"

    - package-ecosystem: "github-actions"
      directory: "/"
      schedule:
        interval: "weekly"
      groups:
        actions-minor-patch:
          update-types:
            - "minor"
            - "patch"
